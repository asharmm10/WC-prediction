version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: wc2026
      MYSQL_USER: wc2026_user
      MYSQL_PASSWORD: wc2026_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=wc2026
      - DB_USER=wc2026_user
      - DB_PASSWORD=wc2026_password
      - DB_HOST=db
      - DB_PORT=3306
      - DJANGO_SECRET_KEY=your-secret-key-change-this
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

volumes:
  mysql_data:
    driver: local
  static_volume:
  media_volume:
