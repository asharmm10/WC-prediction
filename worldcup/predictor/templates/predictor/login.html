{% extends "predictor/base.html" %}
{% load static %}

{% block title %}Login - WC2026{% endblock %}

{% block content %}
<div class="container" style="margin-top:120px;max-width:480px;">
    <div class="glass-card-gold p-4" data-aos="fade-up">
        <div class="text-center mb-4">
            <img src="{% static 'images/bg/wc2026_logo.png' %}{% if xtransformport_param %}?{{ xtransformport_param }}{% endif %}" alt="WC2026" style="height:60px;width:auto;filter:drop-shadow(0 0 12px rgba(212,175,55,0.3));">
            <h2 class="gold-text mt-3" style="font-family:var(--font-heading);font-weight:900;font-size:1.5rem;">Login</h2>
            <p class="text-muted" style="font-size:0.85rem;">Enter your name and secret code to predict</p>
        </div>

        <form method="post" action="">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next_url }}">
            
            <div class="mb-3">
                <label class="form-label">Your Name</label>
                {{ form.name }}
            </div>
            <div class="mb-4">
                <label class="form-label">Secret Code</label>
                {{ form.secret_code }}
            </div>

            <button type="submit" class="btn btn-gold btn-glow w-100" style="min-height:50px;font-family:var(--font-heading);font-weight:800;font-size:1rem;border-radius:14px;">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
